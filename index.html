<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redireccionador</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .background {
            background: linear-gradient(rgba(255, 255, 255, 0.8), rgba(0, 0, 0, 0.6)), url('https://img.lovepik.com/background/20211022/large/lovepik-technological-background-image_402010515.jpg'); /* Fondo de Google */
            background-size: cover;
            background-position: center;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .overlay {
            padding: 20px;
            background-color: #ffffff1a;
           
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%; /* Ancho completo del contenedor */
            height: 3rem;
            margin-bottom: 10px;
            font-size: 1.2rem; /* Tamaño de fuente mayor para los botones */
            transition: transform 0.3s;
      
            border: none; /* Elimina el borde del botón para la transparencia */
        }
        .btn:hover {
            transform: scale(1.1);
        }
        .btn i {
            margin-right: 10px;
        }

    .slider-item img:hover {
        transform: scale(1.1); /* Aumenta el tamaño de la imagen al pasar el mouse */
        transition: transform 0.3s;
    }

       /* Ajustar el tamaño del texto en pantallas pequeñas */
       @media (max-width: 768px) {
        .btn {
            font-size: 12px; /* Reducir el tamaño del texto */
            padding: 10px; /* Ajustar el padding para darle más espacio al texto */
        }
    }
    
    /* Permitir que el texto se ajuste en varias líneas */
    .btn {
        white-space: normal; /* El texto se puede dividir en varias líneas */
        text-align: center; /* Centrar el texto dentro del botón */
    }

    .slider-item {
        position: relative;
    }
    
    .overlay-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-size: 16px;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        pointer-events: none; /* El texto no interfiere con los clics */
    }

    /* Para dispositivos móviles */
    @media (max-width: 768px) {
        .overlay-text {
            font-size: 12px;
        }
    }

    </style>
</head>
